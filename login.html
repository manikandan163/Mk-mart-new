<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MK MART Login</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#2874f0,#0d47a1);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:25px;
    width:320px;
    border-radius:15px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    background:#2874f0;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
}

h2{
    color:#2874f0;
}
</style>
</head>

<body>

<div class="box">
    <h2>🛒 MK MART</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="tel" id="phone" placeholder="Enter Phone">

    <button onclick="login()">Continue</button>
</div>

<script>
function login(){

    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();

    if(name=="" || phone.length<10){
        alert("Enter valid details");
        return;
    }

    localStorage.setItem("userName",name);
    localStorage.setItem("userPhone",phone);

    window.location.href="index.html";
}

// auto skip login if already logged in
if(localStorage.getItem("userName")){
    window.location.href="index.html";
}
</script>

</body>
</html>
